<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uma Homenagem Especial Para Você ❤️</title>
  <meta name="description" content="Alguém criou uma homenagem especial para você. Clique para descobrir.">
  <meta property="og:title" content="Uma Homenagem Especial Para Você ❤️">
  <meta property="og:description" content="Alguém criou uma experiência cinematográfica especialmente para você.">
  <meta property="og:type" content="website">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Raleway:wght@300;400;600;700&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- LZString -->
  <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/viewer.css">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-VGRKDPFVF4"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-VGRKDPFVF4');
  </script>

  <style>
    /* ── Viewer page global overrides ── */
    html, body {
      height: 100%;
      overflow: hidden;
    }

    /* Prevent scroll on body — scenes container handles scrolling */
    body.viewer-mode {
      overflow: hidden;
    }

    /* Opening full-page bg */
    .opening-screen {
      background: var(--bg-dark, #0D0208);
    }

    /* Viewer back button */
    .viewer-back-btn {
      position: fixed;
      top: 1.25rem;
      left: 1.25rem;
      z-index: 600;
      padding: .5rem 1rem;
      background: rgba(0,0,0,.4);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 50px;
      color: rgba(255,255,255,.65);
      font-size: .8rem;
      cursor: pointer;
      transition: all .3s ease;
      text-decoration: none;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      gap: .4rem;
    }

    .viewer-back-btn:hover {
      background: rgba(0,0,0,.6);
      color: #fff;
      border-color: rgba(255,255,255,.25);
    }
  </style>
</head>
<body class="theme-valentine">

  <!-- Back to editor button -->
  <a href="index.html" class="viewer-back-btn" title="Criar sua própria homenagem">
    ← Criar minha homenagem
  </a>

  <!-- ═══ LOADING SCREEN ═══ -->
  <div class="loading-screen" id="loadingScreen">
    <canvas id="loadingCanvas" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;"></canvas>
    <div class="loading-content">
      <div class="loading-heart" id="loadingHeart">💕</div>
      <div class="loading-text">Preparando sua experiência...</div>
      <div class="loading-bar">
        <div class="loading-bar-fill" id="loadingBarFill"></div>
      </div>
    </div>
  </div>

  <!-- ═══ OPENING SCREEN ═══ -->
  <div class="opening-screen" id="openingScreen" style="display:none;">
    <!-- Particle canvas -->
    <canvas id="particleCanvas" class="particle-canvas" style="z-index:1;"></canvas>

    <!-- Ambient orbs will be added by JS -->

    <!-- Content -->
    <div class="opening-content" style="position:relative;z-index:3;">
      <div class="opening-badge" id="openingBadge">💕</div>
      <div class="opening-occasion" id="openingOccasion">Uma Homenagem Especial</div>
      <h1 class="opening-title" id="openingTitle">Carregando...</h1>
      <div class="opening-subtitle" id="openingSubtitle">de alguém especial</div>
      <button class="btn-start-experience" id="startExperience">
        <div class="btn-start-icon">▶</div>
        <span>Começar Nossa História</span>
      </button>
    </div>

    <div class="opening-scroll-hint">Role para baixo ↓</div>
  </div>

  <!-- ═══ SCENES CONTAINER ═══ -->
  <div class="scenes-container" id="scenesContainer" style="display:none;position:relative;z-index:2;">
    <!-- Scenes are injected by viewer.js -->
  </div>

  <!-- ═══ YOUTUBE MUSIC PLAYER ═══ -->
  <div id="youtubePlayer" style="
    display:none;
    position:fixed;
    bottom:-200px;
    left:-200px;
    width:1px;
    height:1px;
    overflow:hidden;
    opacity:0;
    pointer-events:none;
    z-index:-1;
  "></div>

  <!-- Scripts -->
  <script src="js/themes.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/encoder.js"></script>
  <div id="cookie-banner" style="display:none; position:fixed; bottom:0; left:0; right:0; background:rgba(20,20,40,0.95); backdrop-filter:blur(10px); border-top:1px solid rgba(255,255,255,0.1); padding:1rem; z-index:99999; flex-direction:column; gap:1rem; align-items:center; text-align:center; font-family:'Inter',sans-serif;">
    <p style="color:var(--text-light); font-size:0.9rem; margin:0; line-height:1.4;">
      🍪 Usamos cookies para melhorar sua experiência e analisar o tráfego do site. Ao continuar, você concorda com nossa política de privacidade.
    </p>
    <button id="accept-cookies" class="btn-primary" style="padding:0.5rem 1.5rem; font-size:0.9rem; min-width:150px; background:white; color:black; border:none;">Entendi e Aceito</button>
  </div>
  <script>
    if (!localStorage.getItem('cookiesAccepted')) {
      document.getElementById('cookie-banner').style.display = 'flex';
    }
    document.getElementById('accept-cookies').addEventListener('click', function() {
      localStorage.setItem('cookiesAccepted', 'true');
      document.getElementById('cookie-banner').style.display = 'none';
    });
  </script>
  <script src="js/viewer.js"></script>

  <!-- Loading canvas subtle particles -->
  <script>
    // Minimal loading screen particles
    (function () {
      const canvas = document.getElementById('loadingCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const dots = Array.from({ length: 30 }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: 1 + Math.random() * 3,
        vx: (Math.random() - .5) * .4,
        vy: (Math.random() - .5) * .4,
        a: Math.random(),
      }));

      let raf;
      function tick() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        dots.forEach(d => {
          d.x += d.vx; d.y += d.vy;
          if (d.x < 0 || d.x > canvas.width) d.vx *= -1;
          if (d.y < 0 || d.y > canvas.height) d.vy *= -1;
          ctx.beginPath();
          ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(212, 41, 107, ${d.a * .4})`;
          ctx.fill();
        });
        raf = requestAnimationFrame(tick);
      }
      tick();

      // Stop when loading screen hides
      document.getElementById('loadingScreen')?.addEventListener('transitionend', () => {
        cancelAnimationFrame(raf);
      });
    })();
  </script>
</body>
</html>
